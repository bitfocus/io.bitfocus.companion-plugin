<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,minimal-ui,viewport-fit=cover"
		/>
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black" />
		<title>io.bitfocus.companion-plugin Property Inspector</title>

		<script src="js/vendor/sdpi-components.js"></script>
	</head>
	<body>
		<sdpi-item label="Dynamic Page">
			<sdpi-checkbox setting="dynamicPage"></sdpi-checkbox>
		</sdpi-item>
		<sdpi-item label="Page">
			<sdpi-textfield setting="page" pattern="/^\d+$/" placeholder="1"></sdpi-textfield>
		</sdpi-item>
		<sdpi-item label="Row">
			<sdpi-textfield setting="row" pattern="/^\d+$/" placeholder="0"></sdpi-textfield>
		</sdpi-item>
		<sdpi-item label="Column">
			<sdpi-textfield setting="column" pattern="/^\d+$/" placeholder="0"></sdpi-textfield>
		</sdpi-item>
		<sdpi-item>
			<details class="message" id="companion_connect" style="display: none">
				<summary></summary>
			</details>
		</sdpi-item>
		<sdpi-item id="subscriptions_warning" style="display: none">
			<details class="message caution" open>
				<summary style="color:#ff9900;">Button subscriptions not available</summary>
				<p>Fixed-page buttons will not receive images. Enable subscriptions in Companion's Satellite settings, or switch to Dynamic Page mode.</p>
			</details>
		</sdpi-item>
		<sdpi-item>
			<sdpi-button id="open-config"><img
					src="./assets/settings-filled.svg"
					alt="Cog"
					style="width: 14px; height: 14px; margin-right: 4px; margin-bottom: -2px; filter: invert(0.6)"
				/>
				Open Plugin Configuration
			</sdpi-button>
		</sdpi-item>

		<script src="js/inspector.js"></script>
	</body>
</html>
